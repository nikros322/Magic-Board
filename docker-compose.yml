services:
  postgres:
    image: postgres:16-alpine
    container_name: magic_board_postgres
    environment:
      POSTGRES_DB: magic_board_db
      POSTGRES_USER: app_user
      POSTGRES_PASSWORD: strong_password
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U app_user -d magic_board_db"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
